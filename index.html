<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aiden — Your Caregiving Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ledger&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { font-family: 'Inter', sans-serif; background: #f5ede8; color: #211810; }
      button, input, textarea, select { font-family: inherit; }

      /* Global input focus ring */
      input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: #c85c55 !important;
        box-shadow: 0 0 0 3px rgba(200, 92, 85, 0.12) !important;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f5ede8; }
      ::-webkit-scrollbar-thumb { background: #c85c55; border-radius: 3px; }

      /* Smooth transitions on interactive elements */
      button { transition: opacity 0.15s, box-shadow 0.15s; }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
